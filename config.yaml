env:
  robot: Panda
  controller: BASIC
  camera_height: 256
  camera_width: 256
  cameras:
    - agentview
    - robot0_eye_in_hand
  horizon: 2000
  control_freq: 20
  render: true
  extra_objects:         # pre-loaded off-table; each has a colour and shape
    - color: blue
      shape: cylinder
    - color: yellow
      shape: sphere
    - color: orange
      shape: cone
    - color: purple
      shape: cube
  distractors:           # grey obstacle cubes always on the table
    count: 2
  randomization:         # domain randomisation (useful for robustness evaluation)
    enabled: false
    position_noise: 0.03 # metres of uniform noise added to red/green start pos

perception:
  vlm_provider: groq             # openai | groq | local
  vlm_model: meta-llama/llama-4-scout-17b-16e-instruct
  local_vlm_model: llava        # used when vlm_provider=local
  cache_threshold: 0.05         # metres — re-query VLM only if an object moved more than this

planner:
  llm_provider: groq
  llm_model: llama-3.3-70b-versatile
  max_replan_attempts: 2
  temperature: 0.0

voice:
  mode: text                    # text | voice
  whisper_model: base           # tiny | base | small | medium | large
  vad_aggressiveness: 3         # 0–3, higher = more aggressive filtering

skills:
  checkpoint_dir: checkpoints/
  scripted_fallback: true       # use scripted controller when checkpoint missing

training:
  bc_demos: 200
  bc_epochs: 100
  bc_batch_size: 256
  bc_lr: 0.0003
  rl_timesteps: 500000
  rl_learning_rate: 0.0003
  rl_batch_size: 256
  seed: 42
  device: auto                  # auto | cpu | cuda

evaluation:
  episodes: 3            # repetitions per task for the benchmark suite
  seed: 0
  render: false
